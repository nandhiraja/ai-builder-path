<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Presidio Support Agent</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0f1117;
      --surface:  #1a1d27;
      --border:   #2a2d3a;
      --text:     #e1e4ed;
      --muted:    #8b8fa3;
      --accent:   #6c8cff;
      --accent-d: #4c6adb;
      --user-bg:  #1e2a44;
      --ai-bg:    #1a1d27;
      --radius:   10px;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    /* ---- Header ---- */
    header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }
    header .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #34d399;
    }
    header h1 {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: -.2px;
    }
    header span.sub {
      font-size: 12px;
      color: var(--muted);
      margin-left: auto;
    }

    /* ---- Chat area ---- */
    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .msg {
      max-width: 720px;
      padding: 14px 18px;
      border-radius: var(--radius);
      line-height: 1.6;
      font-size: 14px;
      word-break: break-word;
    }

    .msg.user {
      align-self: flex-end;
      background: var(--user-bg);
      border: 1px solid #2a3a5c;
    }

    .msg.ai {
      align-self: flex-start;
      background: var(--ai-bg);
      border: 1px solid var(--border);
    }

    .msg .badge {
      display: inline-block;
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .6px;
      padding: 2px 8px;
      border-radius: 4px;
      margin-bottom: 8px;
    }
    .badge.it   { background: #1c3a3a; color: #5eead4; }
    .badge.finance { background: #3a2c1c; color: #fbbf24; }
    .badge.unknown { background: #2a2a2a; color: #8b8fa3; }

    /* markdown styles inside ai messages */
    .msg.ai h1, .msg.ai h2, .msg.ai h3 {
      margin-top: 12px;
      margin-bottom: 6px;
      font-weight: 600;
    }
    .msg.ai h1 { font-size: 16px; }
    .msg.ai h2 { font-size: 15px; }
    .msg.ai h3 { font-size: 14px; }

    .msg.ai p  { margin-bottom: 8px; }
    .msg.ai ul, .msg.ai ol { padding-left: 20px; margin-bottom: 8px; }
    .msg.ai li { margin-bottom: 4px; }

    .msg.ai code {
      background: #2a2d3a;
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 13px;
    }
    .msg.ai pre {
      background: #2a2d3a;
      padding: 12px;
      border-radius: 6px;
      overflow-x: auto;
      margin-bottom: 8px;
    }
    .msg.ai pre code {
      background: none;
      padding: 0;
    }
    .msg.ai strong { color: #c4cbf5; }
    .msg.ai a { color: var(--accent); }

    /* scrollbar */
    #chat::-webkit-scrollbar { width: 6px; }
    #chat::-webkit-scrollbar-track { background: transparent; }
    #chat::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* ---- Typing indicator ---- */
    .typing {
      display: none;
      align-self: flex-start;
      padding: 14px 18px;
      background: var(--ai-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      gap: 5px;
    }
    .typing.visible { display: flex; }
    .typing span {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--muted);
      animation: blink 1.4s infinite both;
    }
    .typing span:nth-child(2) { animation-delay: .2s; }
    .typing span:nth-child(3) { animation-delay: .4s; }
    @keyframes blink {
      0%, 80%, 100% { opacity: .3; }
      40% { opacity: 1; }
    }

    /* ---- Input bar ---- */
    #input-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 20px;
      border-top: 1px solid var(--border);
      background: var(--surface);
    }
    #input-bar input {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 14px;
      color: var(--text);
      font-family: inherit;
      outline: none;
      transition: border-color .2s;
    }
    #input-bar input:focus {
      border-color: var(--accent);
    }
    #input-bar input::placeholder {
      color: var(--muted);
    }
    #input-bar button {
      background: var(--accent);
      border: none;
      border-radius: 8px;
      padding: 10px 18px;
      color: #fff;
      font-size: 14px;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      transition: background .2s;
    }
    #input-bar button:hover { background: var(--accent-d); }
    #input-bar button:disabled {
      opacity: .45;
      cursor: not-allowed;
    }

    /* ---- Welcome ---- */
    .welcome {
      text-align: center;
      color: var(--muted);
      margin: auto;
      padding: 40px;
    }
    .welcome h2 {
      font-size: 18px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 6px;
    }
    .welcome p { font-size: 13px; line-height: 1.6; }
  </style>
</head>
<body>

  <header>
    <div class="dot"></div>
    <h1>Presidio Support Agent</h1>
    <span class="sub">Multi-Agent System</span>
  </header>

  <div id="chat">
    <div class="welcome">
      <h2>How can we help?</h2>
      <p>Ask about IT (VPN, software, laptops) or Finance (payroll, expenses, budgets).</p>
    </div>
    <div class="typing" id="typing">
      <span></span><span></span><span></span>
    </div>
  </div>

  <div id="input-bar">
    <input id="msg" type="text" placeholder="Type your question..." autocomplete="off" />
    <button id="send">Send</button>
  </div>

  <script>
    const chatEl   = document.getElementById('chat');
    const inputEl  = document.getElementById('msg');
    const sendBtn  = document.getElementById('send');
    const typingEl = document.getElementById('typing');

    let firstMsg = true;

    function scrollBottom() {
      chatEl.scrollTop = chatEl.scrollHeight;
    }

    function addUserMsg(text) {
      if (firstMsg) {
        const w = chatEl.querySelector('.welcome');
        if (w) w.remove();
        firstMsg = false;
      }
      const div = document.createElement('div');
      div.className = 'msg user';
      div.textContent = text;
      chatEl.insertBefore(div, typingEl);
      scrollBottom();
    }

    function addAiMsg(markdown, routedTo) {
      const div = document.createElement('div');
      div.className = 'msg ai';

      const badge = document.createElement('div');
      badge.className = 'badge ' + (routedTo === 'IT' ? 'it' : routedTo === 'FINANCE' ? 'finance' : 'unknown');
      badge.textContent = routedTo === 'IT' ? 'IT Agent' : routedTo === 'FINANCE' ? 'Finance Agent' : 'Agent';
      div.appendChild(badge);

      const body = document.createElement('div');
      body.innerHTML = marked.parse(markdown);
      div.appendChild(body);

      chatEl.insertBefore(div, typingEl);
      scrollBottom();
    }

    async function send() {
      const text = inputEl.value.trim();
      if (!text) return;

      inputEl.value = '';
      sendBtn.disabled = true;
      addUserMsg(text);
      typingEl.classList.add('visible');
      scrollBottom();

      try {
        const res = await fetch('/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: text }),
        });
        const data = await res.json();
        addAiMsg(data.reply, data.routed_to);
      } catch (err) {
        addAiMsg('Something went wrong. Please try again.', 'UNKNOWN');
      } finally {
        typingEl.classList.remove('visible');
        sendBtn.disabled = false;
        inputEl.focus();
      }
    }

    sendBtn.addEventListener('click', send);
    inputEl.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') send();
    });
  </script>
</body>
</html>
