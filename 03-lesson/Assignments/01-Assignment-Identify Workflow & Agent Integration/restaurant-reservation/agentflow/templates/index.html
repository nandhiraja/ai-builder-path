<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TableBot - Reservation Agent</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', 'Segoe UI', sans-serif;
            background: #f5f5f5;
            display: flex;
            justify-content: center;
            padding: 32px 16px;
        }

        .container { width: 100%; max-width: 520px; }

        .header {
            margin-bottom: 16px;
        }

        h1 { font-size: 17px; font-weight: 600; }

        p.subtitle {
            font-size: 12px;
            color: #888;
            margin-top: 3px;
        }

        /* Chat history */
        .chat-history {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 16px;
        }

        .message .label {
            font-size: 11px;
            font-weight: 600;
            color: #999;
            margin-bottom: 4px;
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }

        .message .bubble {
            display: inline-block;
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 6px;
            padding: 10px 14px;
            font-size: 14px;
            line-height: 1.6;
            white-space: pre-wrap;
            max-width: 100%;
        }

        .message.user .bubble {
            background: #1a1a1a;
            color: #fff;
            border-color: #1a1a1a;
        }

        /* Empty state */
        .greeting {
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 6px;
            padding: 14px;
            font-size: 14px;
            color: #555;
            margin-bottom: 16px;
        }

        /* Input */
        .input-area {
            display: flex;
            gap: 8px;
        }

        textarea {
            flex: 1;
            padding: 9px 12px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 14px;
            font-family: inherit;
            resize: none;
        }

        textarea:focus { outline: none; border-color: #333; }

        .btn-send {
            padding: 9px 16px;
            background: #1a1a1a;
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
        }

        .btn-send:hover { background: #444; }

        .btn-reset {
            display: inline-block;
            margin-top: 10px;
            font-size: 12px;
            color: #999;
            text-decoration: underline;
            background: none;
            border: none;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container">

        <div class="header">
            <h1>TableBot</h1>
            <p class="subtitle">AI reservation agent — remembers the conversation, asks for missing details</p>
        </div>

        <!-- Chat history -->
        <div class="chat-history">

            {% if not chat %}
            <div class="greeting">
                Hello! How many guests are you bringing, and when would you like to dine?
            </div>
            {% endif %}

            {% for msg in chat %}
            <div class="message {{ msg.role }}">
                <div class="label">{{ "You" if msg.role == "user" else "Agent" }}</div>
                <div class="bubble">{{ msg.content }}</div>
            </div>
            {% endfor %}

        </div>

        <!-- Input -->
        <form action="/chat" method="post" class="input-area">
            <textarea name="message" rows="2" placeholder="Type your message..." required></textarea>
            <button type="submit" class="btn-send">Send</button>
        </form>

        <!-- Reset -->
        <form action="/reset" method="post">
            <button type="submit" class="btn-reset">Clear conversation</button>
        </form>

    </div>
</body>
</html>
